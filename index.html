              <div class="text2">
                <label>Rasm havola orqali</label>

            </div>
            <div class="text2">

            <div class="btn-row">

                <button class="green"></button>
                <button class="bluewiolet"></button>
              </div>
            </div>
          </div>
        </div>
        </div>
     <div class="project">
